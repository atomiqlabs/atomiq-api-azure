# Docs for the Azure Web Apps Deploy action: https://github.com/azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js project to Azure Function App - atomiqswapsapi-testnet4

on:
  push:
    branches:
      - testnet
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.' # set this to the path to your web app project, defaults to the repository root
  NODE_VERSION: '22.x' # set this to the node version to use (supports 8.x, 10.x, 12.x)

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read #This is required for actions/checkout
      
    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }} Environment
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 'Resolve Project Dependencies Using Npm'
        shell: pwsh
        run: |
          pushd './${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}'
          npm install --omit=dev
          npm run build --if-present
          npm run test --if-present
          popd

      - name: 'Zip Build Output'
        shell: pwsh
        run: |
          tar -a -c -f functionapp.zip "dist" "node_modules" "src" ".funcignore" "package.json" "tsconfig.json" "package-lock.json" "host.json"

      - name: 'Run Azure Functions Action'
        uses: Azure/functions-action@v1
        id: fa
        with:
          app-name: 'atomiqswapsapi-testnet4'
          slot-name: 'Production'
          package: functionapp.zip        # <-- CHANGED
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_F849243E967A4D92A76E088E98194A06 }}
